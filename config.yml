backend:
  name: git-gateway
  branch: main  # Change to 'master' if that's your default branch

media_folder: "public/images/blog"
public_folder: "/images/blog"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"   # ← Astro reads from here
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title",        name: "title",       widget: "string" }
      - { label: "Publish Date", name: "date",        widget: "datetime" }
      - { label: "Author",       name: "author",      widget: "string", default: "Piyush" }
      - { label: "Tags",         name: "tags",        widget: "list",   required: false }
      - { label: "Draft",        name: "draft",       widget: "boolean", default: false }
      - { label: "Cover Image",  name: "cover_image", widget: "image",  required: false }
      - { label: "Body",         name: "body",        widget: "markdown" }
